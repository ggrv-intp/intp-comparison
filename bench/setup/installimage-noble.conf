# Hetzner installimage config -- Ubuntu 24.04 LTS for the V2..V6 disk.
#
# Run from the rescue system after copying this file to /tmp/ on the box:
#
#     installimage -a -c /tmp/installimage-noble.conf
#
# Targets nvme1n1 only; nvme0n1 holds the V1 baseline (22.04) install.
#
# This rescue revision expects a full image path with a valid archive suffix,
# not the short IMAGE alias. The host also boots in UEFI mode, so include an
# EFI System Partition on each disk. The two installs stay isolated: each disk
# has its own ESP and its own GRUB install.
#
# After both disks are imaged, switch which one boots by changing the boot
# device order in Hetzner Robot. There is no shared GRUB menu.
# -----------------------------------------------------------------------------

HOSTNAME intp-modern

# --- Disk layout: the second NVMe holds the modern (V2..V6) OS ---
DRIVE1 /dev/nvme1n1
SWRAID 0
BOOTLOADER grub

# UEFI boot on the second disk, independent from the V1 baseline disk.
PART /boot/efi esp 256M
PART /boot ext4 1024M
PART swap  swap 8G
PART /     ext4 all

# Ubuntu 24.04 LTS ships with kernel 6.8 (the cqm_rmid removal kernel),
# which is exactly what V2..V6 are designed against.
IMAGE /root/.oldroot/nfs/images/Ubuntu-2404-noble-amd64-base.tar.gz

# Optional:
#   SSHKEYS_URL https://example.com/your-keys
#   SSHKEYS ssh-ed25519 AAAA...
