root@intp-v1-baseline ~ # cat /tmp/installimage-jammy.conf
# Hetzner installimage config -- Ubuntu 22.04 LTS for the V0 baseline disk.
#
# Run from the rescue system after copying this file to /tmp/ on the box:
#
#     installimage -a -c /tmp/installimage-jammy.conf
#
# Targets nvme0n1 only; nvme1n1 is reserved for the modern (24.04) install
# done by installimage-noble.conf in a separate boot of the rescue system.
#
# Post-install steps to take after the first reboot:
#   1. apt update && apt install -y git
#   2. git clone <this repo> ~/intp
#   3. sudo bash ~/intp/bench/setup/setup-host.sh
#      ... reboots into HWE 6.5 ...
#   4. sudo bash ~/intp/bench/setup/setup-host.sh   (second pass: builds + tests)
#   5. sudo ~/intp/bench/run-intp-bench.sh --variants v0 --env bare
# -----------------------------------------------------------------------------

HOSTNAME intp-v1-baseline

# --- Disk layout: the first NVMe holds the V0 baseline OS ---
# Hetzner's nvme0n1 is the smaller numerical index disk.
DRIVE1 /dev/nvme0n1
SWRAID 0
BOOTLOADER grub

# Single-disk layout. /boot is its own ext4 partition because GRUB on Hetzner
# servers is friendlier to that. swap is small because we have 256 GiB RAM.
PART /boot/efi esp 256M
PART /boot ext4 1024M
PART swap  swap 8G
PART /     ext4 all

# Ubuntu 22.04 LTS image. installimage resolves the short name against the
# images shipped with the rescue ramdisk; the exact filename varies by
# rescue revision, the short name is stable.
IMAGE /root/.oldroot/nfs/images/Ubuntu-2204-jammy-amd64-base.tar.gz

# Optional: paste your authorized_keys URL or content on the next line and
# uncomment. Either of:
#   SSHKEYS_URL https://example.com/your-keys
#   SSHKEYS ssh-ed25519 AAAA...
